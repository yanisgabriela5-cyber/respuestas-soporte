<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Respuestas rápidas · Soporte Switch Soft</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231BBFC7'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='Arial'>R</text></svg>">
<style>
  :root{
    --teal:#1BBFC7; --teal-dark:#0E8F96; --pink:#FF9FA5; --yellow:#F5C518;
    --ink:#1E2A2B; --paper:#F7FAFA; --border:#E2ECEC; --muted:#5C6F72; --soft:#8A9BA0;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif; background:var(--paper); color:var(--ink); min-height:100vh;}
  header{background:var(--ink); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;}
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-icon{width:40px;height:40px;border-radius:12px;background:var(--teal);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;}
  .brand h1{font-size:17px;color:#fff;line-height:1.2;}
  .brand p{font-size:11px;color:var(--teal);}
  .btn{border:none;cursor:pointer;font-weight:600;font-size:14px;border-radius:10px;padding:9px 16px;display:inline-flex;align-items:center;gap:7px;transition:transform .12s;}
  .btn:hover{transform:scale(1.03);}
  .btn:focus-visible{outline:3px solid var(--yellow);outline-offset:2px;}
  .btn-new{background:var(--yellow);color:var(--ink);}
  .btn-teal{background:var(--teal);color:#fff;}
  .btn-ghost{background:#fff;border:1px solid #D8E4E5;color:var(--ink);}
  .btn-danger{background:#D9535E;color:#fff;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .banner{margin:16px 24px 0;padding:10px 16px;border-radius:10px;font-size:13px;}
  .banner-warn{background:#FFF3C2;color:#7A5F00;}
  .banner-err{background:#FFE8EA;color:#8A2A31;}
  .layout{max-width:1120px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr;gap:24px;}
  .layout.dual{grid-template-columns:1fr 1fr;}
  @media(max-width:820px){.layout.dual{grid-template-columns:1fr;}}
  .search{position:relative;margin-bottom:14px;}
  .search input{width:100%;padding:11px 14px 11px 38px;border:1px solid #D8E4E5;border-radius:12px;font-size:14px;background:#fff;}
  .search input:focus{outline:2px solid var(--teal);}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--soft);}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
  .chip{border:1px solid #D8E4E5;background:#fff;color:var(--ink);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}
  .chip.active{color:#fff;border-color:transparent;}
  .card{background:#fff;border:1px solid var(--border);border-left:5px solid var(--soft);border-radius:12px;padding:15px;margin-bottom:12px;cursor:pointer;transition:box-shadow .15s;}
  .card:hover{box-shadow:0 3px 12px rgba(30,42,43,.09);}
  .card-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;}
  .tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#fff;border-radius:999px;padding:2px 9px;}
  .vars-count{font-size:10px;color:var(--soft);margin-left:8px;}
  .card h3{font-size:14px;margin:6px 0 4px;}
  .card .preview{font-size:12px;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;white-space:pre-line;}
  .icon-btn{border:none;background:transparent;cursor:pointer;padding:6px;border-radius:8px;line-height:0;}
  .icon-btn:hover{background:#F0F5F5;}
  .panel{background:#fff;border:1px solid var(--border);border-radius:16px;padding:20px;height:fit-content;position:sticky;top:16px;}
  .panel h2{font-size:16px;margin-bottom:12px;}
  .panel-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .vars-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
  .vars-grid input, .modal input, .modal textarea, .modal select{padding:9px 12px;border:1px solid #D8E4E5;border-radius:10px;font-size:14px;font-family:inherit;width:100%;}
  .vars-grid input:focus, .modal input:focus, .modal textarea:focus{outline:2px solid var(--teal);}
  .label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--teal-dark);margin-bottom:8px;display:block;}
  .preview-box{background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:15px;font-size:13.5px;line-height:1.55;white-space:pre-wrap;max-height:300px;overflow-y:auto;margin-bottom:14px;}
  .preview-box mark{background:#FFF3C2;color:#7A5F00;border-radius:4px;padding:0 3px;}
  .empty{text-align:center;padding:48px 16px;border:1px dashed #C9D8D9;border-radius:12px;color:var(--soft);font-size:14px;}
  .modal-bg{position:fixed;inset:0;background:rgba(30,42,43,.45);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50;}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:540px;padding:24px;box-shadow:0 12px 40px rgba(0,0,0,.2);max-height:92vh;overflow-y:auto;}
  .modal h2{font-size:16px;}
  .modal .field{margin-bottom:14px;}
  .modal .field label{font-size:12px;font-weight:700;display:block;margin-bottom:5px;}
  .modal .hint{font-weight:400;color:var(--soft);}
  .modal textarea{resize:vertical;min-height:150px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:6px;}
  .hidden{display:none!important;}
  @media (prefers-reduced-motion: reduce){ .btn{transition:none;} }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">R</div>
    <div>
      <h1>Respuestas rápidas</h1>
      <p>Soporte · Switch Soft</p>
    </div>
  </div>
  <button class="btn btn-new" onclick="abrirNueva()">＋ Nueva plantilla</button>
</header>

<div id="bannerLocal" class="banner banner-warn hidden">
  Modo de prueba local: aún no configuró Firebase, las plantillas se guardan solo en este navegador. Complete la sección FIREBASE_CONFIG del archivo para activar el modo compartido en equipo.
</div>
<div id="bannerError" class="banner banner-err hidden"></div>

<div class="layout" id="layout">
  <div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="inputBusqueda" type="text" placeholder="Buscar por título o contenido…" oninput="render()">
    </div>
    <div class="chips" id="chips"></div>
    <div id="lista"></div>
  </div>

  <div class="panel hidden" id="panelUso">
    <div class="panel-head">
      <h2 id="usoTitulo"></h2>
      <button class="icon-btn" onclick="cerrarUso()" aria-label="Cerrar">✕</button>
    </div>
    <div id="usoVarsWrap" class="hidden">
      <span class="label">Complete los datos</span>
      <div class="vars-grid" id="usoVars"></div>
    </div>
    <div class="preview-box" id="usoPreview"></div>
    <button class="btn btn-teal" style="width:100%;justify-content:center;" id="btnCopiar" onclick="copiar()">Copiar respuesta</button>
  </div>
</div>

<!-- Modal crear/editar -->
<div class="modal-bg hidden" id="modalForm">
  <div class="modal">
    <div class="panel-head" style="margin-bottom:16px;">
      <h2 id="formTitulo">Nueva plantilla</h2>
      <button class="icon-btn" onclick="cerrarForm()" aria-label="Cerrar">✕</button>
    </div>
    <div class="field">
      <label for="fTitulo">Título</label>
      <input id="fTitulo" placeholder="Ej.: Seguimiento de caso en revisión">
    </div>
    <div class="field">
      <label>Categoría</label>
      <div class="chips" id="formChips" style="margin-bottom:0;"></div>
    </div>
    <div class="field">
      <label for="fCuerpo">Mensaje <span class="hint">— use llaves para variables: {cliente}, {ticket}, {fecha}…</span></label>
      <textarea id="fCuerpo" placeholder="Estimado(a) {cliente}:&#10;&#10;…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="cerrarForm()">Cancelar</button>
      <button class="btn btn-teal" id="btnGuardar" onclick="guardarForm()">Guardar plantilla</button>
    </div>
  </div>
</div>

<!-- Modal eliminar -->
<div class="modal-bg hidden" id="modalBorrar">
  <div class="modal" style="max-width:400px;">
    <h2 style="margin-bottom:8px;">Eliminar plantilla</h2>
    <p style="font-size:14px;color:var(--muted);margin-bottom:18px;" id="borrarTexto"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="cerrarBorrar()">Cancelar</button>
      <button class="btn btn-danger" onclick="confirmarBorrar()">Eliminar</button>
    </div>
  </div>
</div>

<script type="module">
/* ════════════════════════════════════════════════════════════
   PASO ÚNICO DE CONFIGURACIÓN
   Pegue aquí el objeto firebaseConfig de su proyecto Firebase.
   Mientras esté en null, la app funciona en modo de prueba
   local (solo este navegador).
   ════════════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = null;
/* Ejemplo de cómo debe quedar:
const FIREBASE_CONFIG = {
  apiKey: "AIzaSy...",
  authDomain: "respuestas-soporte.firebaseapp.com",
  projectId: "respuestas-soporte",
  storageBucket: "respuestas-soporte.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abc123"
};
*/

const CATEGORIAS = [
  { id:"seguimiento",     nombre:"Seguimiento",      color:"#1BBFC7" },
  { id:"errores",         nombre:"Errores / Bugs",   color:"#FF9FA5" },
  { id:"novedades",       nombre:"Novedades",        color:"#F5C518" },
  { id:"actualizaciones", nombre:"Actualizaciones",  color:"#0E8F96" },
  { id:"general",         nombre:"General",          color:"#8A9BA0" },
];

const SEMILLA = [
  { titulo:"Confirmación de recepción de solicitud", categoria:"seguimiento",
    cuerpo:"Estimado(a) {cliente}:\n\nHemos recibido su solicitud y quedó registrada con el número {ticket}. Nuestro equipo ya la está revisando y le estaremos informando sobre cualquier avance.\n\nQuedamos atentos a cualquier consulta adicional.\n\nSaludos cordiales,\nEquipo de Soporte Switch Soft" },
  { titulo:"Seguimiento: caso en revisión", categoria:"seguimiento",
    cuerpo:"Estimado(a) {cliente}:\n\nLe escribimos para informarle que su caso {ticket} continúa en revisión por parte de nuestro equipo técnico. Estimamos tener una actualización el {fecha}.\n\nAgradecemos su paciencia y quedamos a su disposición.\n\nSaludos cordiales,\nEquipo de Soporte Switch Soft" },
  { titulo:"Error reportado a desarrollo", categoria:"errores",
    cuerpo:"Estimado(a) {cliente}:\n\nGracias por reportar el inconveniente. Hemos validado el comportamiento que nos describe y fue escalado a nuestro equipo de desarrollo bajo el ticket {ticket}.\n\nEn cuanto tengamos una solución disponible, le notificaremos de inmediato. Mientras tanto, quedamos atentos a cualquier información adicional que desee compartirnos.\n\nSaludos cordiales,\nEquipo de Soporte Switch Soft" },
  { titulo:"Error corregido — solicitar validación", categoria:"errores",
    cuerpo:"Estimado(a) {cliente}:\n\nNos complace informarle que el inconveniente reportado en el ticket {ticket} ya fue corregido. Le agradecemos validar de su lado que todo funcione correctamente y confirmarnos.\n\nQuedamos atentos a sus comentarios.\n\nSaludos cordiales,\nEquipo de Soporte Switch Soft" },
  { titulo:"Anuncio de nueva funcionalidad", categoria:"novedades",
    cuerpo:"Estimado(a) {cliente}:\n\nLe compartimos que ya se encuentra disponible {funcionalidad} en su sistema. Esta mejora le permitirá {beneficio}.\n\nSi desea una breve orientación sobre su uso, con gusto podemos coordinarla.\n\nSaludos cordiales,\nEquipo de Soporte Switch Soft" },
  { titulo:"Aviso de actualización programada", categoria:"actualizaciones",
    cuerpo:"Estimado(a) {cliente}:\n\nLe informamos que el día {fecha} a las {hora} se realizará una actualización programada del sistema. Durante este proceso, el servicio podría presentar intermitencias por un período aproximado de {duracion}.\n\nAgradecemos su comprensión y quedamos atentos a cualquier consulta.\n\nSaludos cordiales,\nEquipo de Soporte Switch Soft" },
  { titulo:"Cierre de caso resuelto", categoria:"general",
    cuerpo:"Estimado(a) {cliente}:\n\nDamos por resuelto el caso {ticket}. Si el inconveniente llegara a presentarse nuevamente o requiere apoyo adicional, no dude en escribirnos y con gusto lo atenderemos.\n\nGracias por confiar en Switch Soft.\n\nSaludos cordiales,\nEquipo de Soporte Switch Soft" },
];

// ─── Estado ───
let plantillas = [];
let catActiva = "todas";
let seleccionada = null;
let editando = null;      // null | "nueva" | id
let porBorrar = null;
let formCategoria = "general";
let db = null;

const $ = (id) => document.getElementById(id);
const esc = (s) => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const extraerVars = (t) => [...new Set((t.match(/\{([^}]+)\}/g)||[]).map(v=>v.slice(1,-1)))];
const catDe = (id) => CATEGORIAS.find(c=>c.id===id) || CATEGORIAS[4];
const mostrarError = (msg) => { const b=$("bannerError"); b.textContent=msg; b.classList.remove("hidden"); };

// ─── Capa de datos: Firestore o localStorage ───
const LS_KEY = "plantillas-soporte-v1";

async function initDatos(){
  if (FIREBASE_CONFIG){
    try {
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
      const fs = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      const app = initializeApp(FIREBASE_CONFIG);
      db = { ...fs, ref: fs.collection(fs.getFirestore(app), "plantillas") };

      // Escucha en tiempo real: cambios de cualquier agente se reflejan al instante
      fs.onSnapshot(db.ref, async (snap) => {
        if (snap.empty && plantillas.length === 0){
          for (const p of SEMILLA) await fs.addDoc(db.ref, { ...p, creado: Date.now() });
          return;
        }
        plantillas = snap.docs.map(d => ({ id:d.id, ...d.data() }))
                              .sort((a,b)=>(b.creado||0)-(a.creado||0));
        render();
      }, (err) => mostrarError("Error de conexión con Firestore: " + err.message));
    } catch (e){
      mostrarError("No se pudo inicializar Firebase. Verifique la configuración pegada en FIREBASE_CONFIG.");
      modoLocal();
    }
  } else {
    modoLocal();
  }
}

function modoLocal(){
  $("bannerLocal").classList.remove("hidden");
  try {
    const raw = localStorage.getItem(LS_KEY);
    plantillas = raw ? JSON.parse(raw) : SEMILLA.map((p,i)=>({ id:"s"+i, ...p, creado: Date.now()-i }));
    if (!raw) localStorage.setItem(LS_KEY, JSON.stringify(plantillas));
  } catch { plantillas = SEMILLA.map((p,i)=>({ id:"s"+i, ...p })); }
  render();
}

async function crearPlantilla(datos){
  if (db){ await db.addDoc(db.ref, { ...datos, creado: Date.now() }); }
  else {
    plantillas.unshift({ id:"p"+Date.now(), ...datos, creado: Date.now() });
    localStorage.setItem(LS_KEY, JSON.stringify(plantillas));
    render();
  }
}
async function actualizarPlantilla(id, datos){
  if (db){ await db.updateDoc(db.doc(db.ref.firestore, "plantillas", id), datos); }
  else {
    plantillas = plantillas.map(p => p.id===id ? { ...p, ...datos } : p);
    localStorage.setItem(LS_KEY, JSON.stringify(plantillas));
    render();
  }
}
async function eliminarPlantilla(id){
  if (db){ await db.deleteDoc(db.doc(db.ref.firestore, "plantillas", id)); }
  else {
    plantillas = plantillas.filter(p => p.id!==id);
    localStorage.setItem(LS_KEY, JSON.stringify(plantillas));
    render();
  }
}

// ─── Render ───
function render(){
  // Chips de categorías
  const chips = [`<button class="chip ${catActiva==="todas"?"active":""}" style="${catActiva==="todas"?"background:#1E2A2B;":""}" data-cat="todas">Todas (${plantillas.length})</button>`]
    .concat(CATEGORIAS.map(c => {
      const n = plantillas.filter(p=>p.categoria===c.id).length;
      const act = catActiva===c.id;
      return `<button class="chip ${act?"active":""}" style="${act?`background:${c.color};`:""}" data-cat="${c.id}">${c.nombre} (${n})</button>`;
    }));
  $("chips").innerHTML = chips.join("");
  $("chips").querySelectorAll(".chip").forEach(b => b.onclick = () => { catActiva = b.dataset.cat; render(); });

  // Lista filtrada
  const q = $("inputBusqueda").value.trim().toLowerCase();
  const filtradas = plantillas.filter(p =>
    (catActiva==="todas" || p.categoria===catActiva) &&
    (!q || p.titulo.toLowerCase().includes(q) || p.cuerpo.toLowerCase().includes(q))
  );

  if (!filtradas.length){
    $("lista").innerHTML = `<div class="empty">No hay plantillas que coincidan.</div>`;
  } else {
    $("lista").innerHTML = filtradas.map(p => {
      const c = catDe(p.categoria);
      const nv = extraerVars(p.cuerpo).length;
      return `<div class="card" style="border-left-color:${c.color};" data-id="${p.id}">
        <div class="card-top">
          <div style="min-width:0;">
            <span class="tag" style="background:${c.color};">${c.nombre}</span>
            ${nv ? `<span class="vars-count">🏷 ${nv} variable(s)</span>` : ""}
            <h3>${esc(p.titulo)}</h3>
            <div class="preview">${esc(p.cuerpo)}</div>
          </div>
          <div style="display:flex;gap:2px;flex-shrink:0;">
            <button class="icon-btn" data-editar="${p.id}" title="Editar">✏️</button>
            <button class="icon-btn" data-borrar="${p.id}" title="Eliminar">🗑</button>
          </div>
        </div>
      </div>`;
    }).join("");

    $("lista").querySelectorAll(".card").forEach(el => el.onclick = () => abrirUso(el.dataset.id));
    $("lista").querySelectorAll("[data-editar]").forEach(b => b.onclick = (e) => { e.stopPropagation(); abrirEdicion(b.dataset.editar); });
    $("lista").querySelectorAll("[data-borrar]").forEach(b => b.onclick = (e) => { e.stopPropagation(); abrirBorrar(b.dataset.borrar); });
  }

  if (seleccionada && !plantillas.find(p=>p.id===seleccionada.id)) cerrarUso();
}

// ─── Panel de uso ───
let valores = {};
function abrirUso(id){
  seleccionada = plantillas.find(p=>p.id===id);
  if (!seleccionada) return;
  valores = {};
  const vars = extraerVars(seleccionada.cuerpo);
  $("usoTitulo").textContent = seleccionada.titulo;
  if (vars.length){
    $("usoVarsWrap").classList.remove("hidden");
    $("usoVars").innerHTML = vars.map(v => `<input placeholder="${esc(v)}" data-var="${esc(v)}">`).join("");
    $("usoVars").querySelectorAll("input").forEach(i => i.oninput = () => { valores[i.dataset.var]=i.value; renderPreview(); });
  } else {
    $("usoVarsWrap").classList.add("hidden");
  }
  $("layout").classList.add("dual");
  $("panelUso").classList.remove("hidden");
  renderPreview();
  resetCopiar();
}
function textoFinal(){
  let t = seleccionada.cuerpo;
  for (const [k,v] of Object.entries(valores)) if (v) t = t.split(`{${k}}`).join(v);
  return t;
}
function renderPreview(){
  $("usoPreview").innerHTML = esc(textoFinal()).replace(/\{[^}]+\}/g, m => `<mark>${m}</mark>`);
}
function cerrarUso(){ seleccionada=null; $("panelUso").classList.add("hidden"); $("layout").classList.remove("dual"); }
function resetCopiar(){ const b=$("btnCopiar"); b.textContent="Copiar respuesta"; b.style.background=""; }
async function copiar(){
  const t = textoFinal();
  try { await navigator.clipboard.writeText(t); }
  catch {
    const ta = document.createElement("textarea"); ta.value=t; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
  }
  const b=$("btnCopiar"); b.textContent="✓ Copiado al portapapeles"; b.style.background="#2FA34D";
  setTimeout(resetCopiar, 1800);
}

// ─── Formulario crear/editar ───
function renderFormChips(){
  $("formChips").innerHTML = CATEGORIAS.map(c => {
    const act = formCategoria===c.id;
    return `<button class="chip ${act?"active":""}" style="${act?`background:${c.color};`:""}" data-fcat="${c.id}">${c.nombre}</button>`;
  }).join("");
  $("formChips").querySelectorAll(".chip").forEach(b => b.onclick = () => { formCategoria=b.dataset.fcat; renderFormChips(); });
}
function abrirNueva(){
  editando = "nueva"; formCategoria = "general";
  $("formTitulo").textContent = "Nueva plantilla";
  $("fTitulo").value = ""; $("fCuerpo").value = "";
  renderFormChips();
  $("modalForm").classList.remove("hidden");
  $("fTitulo").focus();
}
function abrirEdicion(id){
  const p = plantillas.find(x=>x.id===id); if(!p) return;
  editando = id; formCategoria = p.categoria;
  $("formTitulo").textContent = "Editar plantilla";
  $("fTitulo").value = p.titulo; $("fCuerpo").value = p.cuerpo;
  renderFormChips();
  $("modalForm").classList.remove("hidden");
}
function cerrarForm(){ editando=null; $("modalForm").classList.add("hidden"); }
async function guardarForm(){
  const titulo = $("fTitulo").value.trim();
  const cuerpo = $("fCuerpo").value.trim();
  if (!titulo || !cuerpo) return;
  $("btnGuardar").disabled = true;
  try {
    if (editando==="nueva") await crearPlantilla({ titulo, cuerpo, categoria: formCategoria });
    else await actualizarPlantilla(editando, { titulo, cuerpo, categoria: formCategoria });
    cerrarForm();
  } catch(e){ mostrarError("No se pudo guardar: " + e.message); }
  $("btnGuardar").disabled = false;
}

// ─── Eliminar ───
function abrirBorrar(id){
  porBorrar = plantillas.find(x=>x.id===id); if(!porBorrar) return;
  $("borrarTexto").textContent = `Se eliminará «${porBorrar.titulo}» para todo el equipo. Esta acción no se puede deshacer.`;
  $("modalBorrar").classList.remove("hidden");
}
function cerrarBorrar(){ porBorrar=null; $("modalBorrar").classList.add("hidden"); }
async function confirmarBorrar(){
  if (!porBorrar) return;
  try { await eliminarPlantilla(porBorrar.id); } catch(e){ mostrarError("No se pudo eliminar: " + e.message); }
  cerrarBorrar();
}

// Exponer funciones usadas en atributos onclick
Object.assign(window, { abrirNueva, cerrarForm, guardarForm, cerrarUso, copiar, cerrarBorrar, confirmarBorrar });

initDatos();
</script>
</body>
</html>
